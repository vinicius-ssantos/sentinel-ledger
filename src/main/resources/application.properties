spring.application.name=sentinel-ledger
spring.modulith.detection-strategy=explicitly-annotated

spring.datasource.url=${SENTINEL_DB_URL:jdbc:postgresql://localhost:5432/sentinel_ledger}
spring.datasource.username=${SENTINEL_DB_USERNAME:sentinel}
spring.datasource.password=${SENTINEL_DB_PASSWORD:sentinel}
spring.datasource.hikari.maximum-pool-size=${SENTINEL_DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.connection-timeout=${SENTINEL_DB_CONNECTION_TIMEOUT_MS:5000}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.sql.init.mode=never

sentinel.merchant.directory[0].id=${SENTINEL_MERCHANT_ID:11111111-1111-1111-1111-111111111111}
sentinel.merchant.directory[0].api-key-id=${SENTINEL_MERCHANT_API_KEY_ID:sentinel-dev-merchant}
sentinel.merchant.directory[0].api-key-secret=${SENTINEL_MERCHANT_API_KEY_SECRET:sentinel-dev-secret}

sentinel.operator.directory[0].id=${SENTINEL_OPERATOR_ID:33333333-3333-3333-3333-333333333333}
sentinel.operator.directory[0].api-key-id=${SENTINEL_OPERATOR_API_KEY_ID:sentinel-dev-operator}
sentinel.operator.directory[0].api-key-secret=${SENTINEL_OPERATOR_API_KEY_SECRET:sentinel-dev-operator-secret}

sentinel.reconciliation.stale-after=${SENTINEL_RECONCILIATION_STALE_AFTER:PT15M}
sentinel.reconciliation.sweep-interval=${SENTINEL_RECONCILIATION_SWEEP_INTERVAL:PT5M}

sentinel.outbox.batch-size=${SENTINEL_OUTBOX_BATCH_SIZE:50}
sentinel.outbox.dispatch-interval=${SENTINEL_OUTBOX_DISPATCH_INTERVAL:PT5S}
sentinel.outbox.claim-stale-after=${SENTINEL_OUTBOX_CLAIM_STALE_AFTER:PT2M}
sentinel.outbox.reclaim-interval=${SENTINEL_OUTBOX_RECLAIM_INTERVAL:PT1M}
sentinel.outbox.max-attempts=${SENTINEL_OUTBOX_MAX_ATTEMPTS:5}

spring.rabbitmq.host=${SENTINEL_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SENTINEL_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SENTINEL_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SENTINEL_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

sentinel.messaging.enabled=${SENTINEL_MESSAGING_ENABLED:false}
sentinel.messaging.exchange=${SENTINEL_MESSAGING_EXCHANGE:sentinel.events}
sentinel.messaging.queue=${SENTINEL_MESSAGING_QUEUE:sentinel.events.q}
sentinel.messaging.dead-letter-exchange=${SENTINEL_MESSAGING_DEAD_LETTER_EXCHANGE:sentinel.events.dlx}
sentinel.messaging.dead-letter-queue=${SENTINEL_MESSAGING_DEAD_LETTER_QUEUE:sentinel.events.dlq}
sentinel.messaging.max-attempts=${SENTINEL_MESSAGING_MAX_ATTEMPTS:5}
sentinel.messaging.initial-interval=${SENTINEL_MESSAGING_INITIAL_INTERVAL:PT0.5S}
sentinel.messaging.multiplier=${SENTINEL_MESSAGING_MULTIPLIER:2.0}
sentinel.messaging.max-interval=${SENTINEL_MESSAGING_MAX_INTERVAL:PT10S}
sentinel.messaging.publisher-confirm-timeout-millis=${SENTINEL_MESSAGING_PUBLISHER_CONFIRM_TIMEOUT_MILLIS:5000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.rabbit.enabled=${SENTINEL_MESSAGING_ENABLED:false}

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
