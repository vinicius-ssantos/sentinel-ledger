spring.application.name=sentinel-ledger
spring.modulith.detection-strategy=explicitly-annotated

spring.datasource.url=${SENTINEL_DB_URL:jdbc:postgresql://localhost:5432/sentinel_ledger}
spring.datasource.username=${SENTINEL_DB_USERNAME:sentinel}
spring.datasource.password=${SENTINEL_DB_PASSWORD:sentinel}
spring.datasource.hikari.maximum-pool-size=${SENTINEL_DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.connection-timeout=${SENTINEL_DB_CONNECTION_TIMEOUT_MS:5000}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.sql.init.mode=never

sentinel.merchant.directory[0].id=${SENTINEL_MERCHANT_ID:11111111-1111-1111-1111-111111111111}
sentinel.merchant.directory[0].api-key-id=${SENTINEL_MERCHANT_API_KEY_ID:sentinel-dev-merchant}
sentinel.merchant.directory[0].api-key-secret=${SENTINEL_MERCHANT_API_KEY_SECRET:sentinel-dev-secret}

sentinel.operator.directory[0].id=${SENTINEL_OPERATOR_ID:33333333-3333-3333-3333-333333333333}
sentinel.operator.directory[0].api-key-id=${SENTINEL_OPERATOR_API_KEY_ID:sentinel-dev-operator}
sentinel.operator.directory[0].api-key-secret=${SENTINEL_OPERATOR_API_KEY_SECRET:sentinel-dev-operator-secret}

sentinel.reconciliation.stale-after=${SENTINEL_RECONCILIATION_STALE_AFTER:PT15M}
sentinel.reconciliation.sweep-interval=${SENTINEL_RECONCILIATION_SWEEP_INTERVAL:PT5M}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
