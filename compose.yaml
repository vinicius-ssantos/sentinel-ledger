services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${SENTINEL_DB_NAME:-sentinel_ledger}
      POSTGRES_USER: ${SENTINEL_DB_USERNAME:-sentinel}
      POSTGRES_PASSWORD: ${SENTINEL_DB_PASSWORD:-sentinel}
    ports:
      - "${SENTINEL_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SENTINEL_DB_USERNAME:-sentinel} -d ${SENTINEL_DB_NAME:-sentinel_ledger}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - sentinel-postgres-data:/var/lib/postgresql/data

volumes:
  sentinel-postgres-data:
