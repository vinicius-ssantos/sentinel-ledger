services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${SENTINEL_DB_NAME:-sentinel_ledger}
      POSTGRES_USER: ${SENTINEL_DB_USERNAME:-sentinel}
      POSTGRES_PASSWORD: ${SENTINEL_DB_PASSWORD:-sentinel}
    ports:
      - "${SENTINEL_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SENTINEL_DB_USERNAME:-sentinel} -d ${SENTINEL_DB_NAME:-sentinel_ledger}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - sentinel-postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${SENTINEL_RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${SENTINEL_RABBITMQ_PASSWORD:-guest}
    ports:
      - "${SENTINEL_RABBITMQ_PORT:-5672}:5672"
      - "${SENTINEL_RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - sentinel-rabbitmq-data:/var/lib/rabbitmq

volumes:
  sentinel-postgres-data:
  sentinel-rabbitmq-data:
